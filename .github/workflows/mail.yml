name: VPN-Start-Service

on:
  repository_dispatch:
    types: [start_proxy]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          curl -L -o cf.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cf.deb

      - name: Generate Config
        id: vars
        run: |
          UUID=$(xray uuid)
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          cat <<EOF > config.json
          {
            "inbounds": [{
              "port": 8080, "protocol": "vless",
              "settings": {"clients": [{"id": "$UUID"}], "decryption": "none"},
              "streamSettings": {"network": "ws", "wsSettings": {"path": "/speedtest"}}
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

      - name: Start Services
        run: |
          sudo /usr/local/bin/xray run -c $(pwd)/config.json > xray.log 2>&1 &
          cloudflared tunnel --url http://localhost:8080 > cf.log 2>&1 &
          sleep 30

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 🚀 你的 GitHub VPN 节点已就绪
          to: 554088258@qq.com
          from: GitHub Action
          body: |
            节点已启动！有效期 6 小时。
            
            VLESS 链接 (直接复制):
            vless://${{ steps.vars.outputs.uuid }}@$(cat cf.log | grep -oE '[-a-zA-Z0-9]+\.trycloudflare\.com' | head -n 1 | tr -d '\n'):443?encryption=none&security=tls&type=ws&host=$(cat cf.log | grep -oE '[-a-zA-Z0-9]+\.trycloudflare\.com' | head -n 1 | tr -d '\n')&path=%2Fspeedtest#GitHub-VPN

      - name: Keep Alive
        run: sleep 21600
