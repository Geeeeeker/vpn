name: Redroid 云手机部署 (修复版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限模式'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-magisk'
          - 'without-root'
      screen_width:
        description: '屏幕宽度'
        default: '1080'
      screen_height:
        description: '屏幕高度'
        default: '1920'
      dpi:
        description: '屏幕 DPI'
        default: '480'
      gpu_mode:
        description: 'GPU 加速模式'
        required: true
        type: choice
        default: 'guest'
        options:
          - 'guest'
          - 'host'
          - 'auto'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 优化系统内核模块
        run: |
          # 仅安装必要的工具，跳过内核完整更新以节省时间
          sudo apt-get update
          sudo apt-get install -y adb
          
          # 尝试加载 binder 模块 (Redroid 核心需求)
          # 在新版内核中，如果 modprobe 失败，尝试挂载 binderfs
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || echo "Binder module load failed, skipping..."
          
          # 注意：新内核已舍弃 ashmem，Redroid 会自动处理，所以不再尝试 modprobe ashmem

      - name: 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          
          # Root 逻辑
          ROOT_PROPS=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-magisk" ]; then
            ROOT_PROPS="androidboot.redroid_debuggable=1"
          fi

          # 启动 Redroid
          # 增加 --pull always 确保镜像最新
          docker run -d --privileged \
            --name redroid_container \
            --pull always \
            -v ~/data:/data \
            -p 5555:5555 \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=${{ github.event.inputs.gpu_mode }} \
            $ROOT_PROPS

      - name: 部署 Web 控制端 (ws-scrcpy)
        run: |
          docker run -d \
            --name ws-scrcpy \
            --link redroid_container:phone \
            -p 8000:8000 \
            -e ADB_SERVER_SOCKET=tcp:phone:5555 \
            butomo1989/docker-ws-scrcpy

      - name: Cloudflare 穿透
        id: cf_tunnel
        run: |
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          
          # 启动临时隧道
          nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          echo "等待隧道分配域名..."
          timeout 30s bash -c 'until grep -o "https://.*\.trycloudflare\.com" cf.log; do sleep 1; done' || true
          
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          echo "public_url=$CF_URL" >> $GITHUB_OUTPUT

      - name: 验证并输出结果
        run: |
          echo "=========================================="
          echo "✅ 部署尝试完成！"
          echo "🔗 Web 访问地址: ${{ steps.cf_tunnel.outputs.public_url }}"
          echo "=========================================="
          echo "提示：如果页面长时间黑屏，请在页面右侧切换解码器（如 H264）"
          
          # 尝试 ADB 连接验证容器内 Android 状态
          adb connect localhost:5555 || true
          sleep 5
          adb devices
          echo "=========================================="

      - name: 保持运行 (6小时)
        run: sleep 21600
