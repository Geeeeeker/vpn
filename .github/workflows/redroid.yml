name: Redroid 云手机 (动态域名优化版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '1080'
      screen_height:
        description: '高度'
        default: '1920'
      dpi:
        description: 'DPI'
        default: '480'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 ADB 与 Cloudflared
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          # 参考案例：使用官方完整链接下载并安装
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          sleep 10
          adb connect 127.0.0.1:5555 || true

      - name: 3. 启动 Web UI (npx 模式)
        run: |
          # 启动 Web 端并监听 8000 端口
          nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
          sleep 15

      - name: 4. 启动隧道并提取动态域名
        id: tunnel
        run: |
          # 参考案例：启动隧道并将日志重定向
          cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          # 等待建立连接
          sleep 25
          
          # 参考案例：使用正则表达式精准提取域名
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 隧道启动失败，完整日志如下:"
            cat cf.log
            exit 1
          fi
          
          echo "url=$CF_URL" >> $GITHUB_OUTPUT
          echo "提取到的域名: $CF_URL"

      - name: 5. 验证服务状态
        run: |
          echo "=========================================="
          echo "✅ Redroid云手机部署完成！"
          echo "=========================================="
          echo ""
          echo "📱 云手机配置信息:"
          echo "  - Android版本: ${{ github.event.inputs.android_version }}"
          echo "  - Root模式: ${{ github.event.inputs.root_mode }}"
          echo "  - 屏幕分辨率: ${{ github.event.inputs.screen_width }}x${{ github.event.inputs.screen_height }}"
          echo "  - DPI: ${{ github.event.inputs.dpi }}"
          echo ""
          echo "🔗 访问方式:"
          echo "  - Web访问: ${{ steps.tunnel.outputs.url }}"
          echo ""
          echo "📊 服务状态:"
          echo "  - Redroid容器: $(docker ps --filter name=redroid --format '{{.Status}}')"
          echo "  - ADB设备:"
          adb devices | grep "5555"
          echo "=========================================="

      - name: 6. 持续运行
        run: sleep 21600
