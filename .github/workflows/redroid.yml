name: Redroid 云手机 (终极整合版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
      root_mode:
        description: 'Root 权限 (默认非Root)'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'without-root'
          - 'with-root'
      screen_width:
        description: '宽度'
        default: '720'
      screen_height:
        description: '高度'
        default: '1280'
      dpi:
        description: 'DPI'
        default: '320'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装环境与 Cloudflared (参考高速案例)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          
          # 完全采用你提供的成功案例安装逻辑
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # 尝试加载内核模块
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || echo "Binder Load Skip"

      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          
          # Root 参数处理
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          sleep 10
          adb connect 127.0.0.1:5555 || true

      - name: 3. 启动 Web 控制端 (npx 模式)
        run: |
          # 启动 Web UI 并监听 8000 端口
          nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
          sleep 15

      - name: 4. 启动隧道与域名提取 (参考高速案例)
        id: tunnel
        run: |
          # 启动隧道指向 Web UI 端口
          cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          # 等待域名生成
          sleep 25
          
          # 采用你案例中的精准正则提取方式
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 隧道启动失败，查看日志:"
            cat cf.log
            exit 1
          fi
          
          echo "url=$CF_URL" >> $GITHUB_OUTPUT
          echo "提取到的公网地址: $CF_URL"

      - name: 5. 验证服务状态
        run: |
          echo "=========================================="
          echo "✅ Redroid 云手机部署完成！"
          echo "=========================================="
          echo "📱 配置信息:"
          echo "  - 版本: Android ${{ github.event.inputs.android_version }}"
          echo "  - DPI: ${{ github.event.inputs.dpi }}"
          echo ""
          echo "🔗 访问方式 (点击下方链接):"
          echo "  ${{ steps.tunnel.outputs.url }}"
          echo ""
          echo "📊 实时状态:"
          echo "  - 容器: $(docker ps --filter name=redroid --format '{{.Status}}')"
          adb devices | grep "5555" || echo "  ⚠️ ADB 正在启动中，请在网页稍后刷新"
          echo "=========================================="

      - name: 6. 保持运行 (6小时)
        run: sleep 21600
