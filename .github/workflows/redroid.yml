name: Redroid 云手机 (Node一键启动版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '1080'
      screen_height:
        description: '高度'
        default: '1920'
      dpi:
        description: 'DPI'
        default: '480'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 准备环境 (ADB & Node.js)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          # 确保有 Node 运行环境
          node -v
          
      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          # 等待并连接 adb
          sleep 10
          adb connect 127.0.0.1:5555

      - name: 3. 运行 Web 界面 (使用 npx 免克隆启动)
        run: |
          # 使用 npx 直接运行 ws-scrcpy，不依赖 docker 和本地克隆
          # 这样可以保证一定能运行最新版且不需要手动安装依赖
          nohup npx ws-scrcpy > web.log 2>&1 &
          echo "Web 服务已在后台启动"
          sleep 10 # 给 npx 一些下载运行的时间

      - name: 4. Cloudflare 公网穿透
        id: cf_tunnel
        run: |
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          
          # ws-scrcpy 默认监听端口通常是 8000
          nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          echo "正在获取公网链接..."
          # 循环等待直到域名出现或超时
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
            if [ ! -z "$CF_URL" ]; then
              echo "public_url=$CF_URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 1
          done

      - name: 5. 最终输出
        run: |
          echo "=========================================="
          echo "✅ 云手机部署成功！"
          echo "🔗 访问地址: ${{ steps.cf_tunnel.outputs.public_url }}"
          echo "=========================================="
          echo "📱 手机状态:"
          adb devices
          echo "=========================================="

      - name: 持续运行 (6小时)
        run: sleep 21600
