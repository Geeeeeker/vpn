name: Redroid 云手机部署 (稳健版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限模式'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-magisk'
          - 'without-root'
      screen_width:
        description: '屏幕宽度'
        default: '1080'
      screen_height:
        description: '屏幕高度'
        default: '1920'
      dpi:
        description: '屏幕 DPI'
        default: '480'
      gpu_mode:
        description: 'GPU 加速模式'
        required: true
        type: choice
        default: 'guest'
        options:
          - 'guest'
          - 'host'
          - 'auto'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 优化内核与安装 ADB
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          sudo modprobe binder_linux || echo "Binder Loaded"
          
      - name: 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PROPS=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-magisk" ]; then
            ROOT_PROPS="androidboot.redroid_debuggable=1"
          fi

          # 启动 Android 容器
          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            -v ~/data:/data \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=${{ github.event.inputs.gpu_mode }} \
            $ROOT_PROPS

      - name: 部署 Web 控制端 (使用存量稳定的镜像)
        run: |
          # 改用目前存量最稳、由组织维护的镜像
          # 该镜像专门用于 Web 端远程操作 scrcpy
          docker run -d \
            --name scrcpy-web \
            --network host \
            --pull always \
            -e ADB_SERVER_IP=127.0.0.1 \
            -p 8000:8000 \
            -p 48000:48000 \
            docker.io/yumechan/scrcpy-web:latest || \
          docker run -d --name scrcpy-web --network host -p 8000:8000 srs-stack/srs-stack:latest

          # 确保宿主机 ADB 与 Android 容器连接
          sleep 15
          adb connect 127.0.0.1:5555 || true

      - name: Cloudflare 穿透
        id: cf_tunnel
        run: |
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          
          # 穿透 8000 端口
          nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          echo "等待生成公网链接..."
          sleep 20
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          echo "public_url=$CF_URL" >> $GITHUB_OUTPUT

      - name: 验证服务
        run: |
          echo "=========================================="
          echo "🚀 云手机启动尝试已发出！"
          echo "🔗 访问地址: ${{ steps.cf_tunnel.outputs.public_url }}"
          echo "=========================================="
          echo "状态检查:"
          adb devices
          docker ps
          echo "=========================================="

      - name: 保持运行 (6小时)
        run: sleep 21600
