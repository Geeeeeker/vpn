name: Redroid 云手机部署 (修复版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限模式'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-magisk'
          - 'without-root'
      screen_width:
        description: '屏幕宽度'
        default: '1080'
      screen_height:
        description: '屏幕高度'
        default: '1920'
      dpi:
        description: '屏幕 DPI'
        default: '480'
      gpu_mode:
        description: 'GPU 加速模式'
        required: true
        type: choice
        default: 'guest'
        options:
          - 'guest'
          - 'host'
          - 'auto'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 优化系统内核模块
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || echo "Binder 模块加载跳过"
          
      - name: 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PROPS=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-magisk" ]; then
            ROOT_PROPS="androidboot.redroid_debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid_container \
            --pull always \
            -v ~/data:/data \
            -p 5555:5555 \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=${{ github.event.inputs.gpu_mode }} \
            $ROOT_PROPS

      - name: 部署 Web 控制端 (Scrcpy-Web)
        run: |
          # 使用新的替代镜像 empanda/scrcpy-web
          docker run -d \
            --name scrcpy-web \
            --link redroid_container:phone \
            -p 8000:8000 \
            empanda/scrcpy-web:latest
          
          # 等待服务启动并手动连接 adb
          sleep 10
          docker exec scrcpy-web adb connect phone:5555

      - name: Cloudflare 穿透
        id: cf_tunnel
        run: |
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          
          nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          echo "等待隧道分配域名..."
          timeout 30s bash -c 'until grep -o "https://.*\.trycloudflare\.com" cf.log; do sleep 1; done' || true
          
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          echo "public_url=$CF_URL" >> $GITHUB_OUTPUT

      - name: 验证并输出结果
        run: |
          echo "=========================================="
          echo "✅ 部署成功！"
          echo "🔗 访问地址: ${{ steps.cf_tunnel.outputs.public_url }}"
          echo "=========================================="
          echo "💡 使用提示:"
          echo "1. 打开链接后，你会看到设备列表。"
          echo "2. 点击设备旁边的蓝色按钮进入远程控制界面。"
          echo "3. 如果连接断开，请刷新页面。"
          echo "=========================================="

      - name: 保持运行 (6小时)
        run: sleep 21600
