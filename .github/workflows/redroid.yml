name: Redroid 云手机 (全环境兼容版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '720'
      screen_height:
        description: '高度'
        default: '1280'
      dpi:
        description: 'DPI'
        default: '320'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 内核加固与下载工具准备
        run: |
          sudo apt-get update
          sudo apt-get install -y adb curl wget
          
          # 创建并强制挂载 binderfs
          sudo mkdir -p /dev/binderfs
          sudo mount -t binder binder /dev/binderfs || echo "BinderFS 挂载跳过"
          
          # 建立软链接，这是 Redroid 识别 Binder 的关键
          for dev in binder hwbinder vndbinder; do
            sudo ln -s /dev/binderfs/$dev /dev/$dev || true
          done
          sudo chmod 777 /dev/binder* || true

      - name: 2. 安装 Cloudflared (可靠二进制模式)
        run: |
          # 使用 -O 强制指定输出文件名，确保 chmod 能找到它
          wget -q https://github.com -O cloudflared
          
          if [ ! -f "cloudflared" ]; then
            echo "❌ 下载失败，尝试备用地址"
            curl -L https://github.com -o cloudflared
          fi
          
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: 3. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          # 启动容器：映射 binderfs 目录并开启特权
          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            -v /dev/binderfs:/dev/binderfs \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          # 等待并尝试 adb 握手
          sleep 20
          adb connect 127.0.0.1:5555 || true

      - name: 4. 运行 Web UI 并启动隧道
        id: tunnel
        run: |
          # 强制安装并启动 Web 端
          nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
          sleep 15
          
          # 启动隧道
          nohup cloudflared tunnel --url http://127.0.0.1:8000 > cf.log 2>&1 &
          
          echo "正在提取动态域名..."
          for i in {1..45}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
            if [ ! -z "$CF_URL" ]; then
              echo "url=$CF_URL" >> $GITHUB_OUTPUT
              echo "成功找到域名: $CF_URL"
              break
            fi
            sleep 2
          done

      - name: 5. 验证部署结果
        run: |
          echo "=========================================="
          echo "✅ 极速部署完成"
          echo "🔗 云手机地址: ${{ steps.tunnel.outputs.url }}"
          echo "=========================================="
          echo "📊 检查列表:"
          docker ps | grep redroid || echo "⚠️ 容器未在运行"
          adb devices | grep 5555 || echo "⚠️ ADB 未能识别设备"
          echo "=========================================="

      - name: 持续运行
        run: sleep 21600
