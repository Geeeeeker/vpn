name: Redroid 云手机 (内核补丁版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '720'
      screen_height:
        description: '高度'
        default: '1280'
      dpi:
        description: 'DPI'
        default: '320'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 强制启用 BinderFS (内核补丁)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb curl wget
          
          # 创建并挂载 binderfs (Redroid 核心)
          sudo mkdir -p /dev/binderfs
          sudo mount -t binder binder /dev/binderfs || echo "BinderFS mount failed"
          # 建立软链接兼容 Redroid
          sudo ln -s /dev/binderfs/binder /dev/binder || true
          sudo ln -s /dev/binderfs/hwbinder /dev/hwbinder || true
          sudo ln -s /dev/binderfs/vndbinder /dev/vndbinder || true
          sudo chmod 777 /dev/binder* || true

      - name: 2. 安装 Cloudflared (二进制模式)
        run: |
          # 放弃 dpkg，直接下载可执行二进制，防止格式错误
          wget -q https://github.com
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          cloudflared --version

      - name: 3. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          # 增加内核支持参数
          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            -v /dev/binderfs:/dev/binderfs \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          sleep 15
          adb connect 127.0.0.1:5555 || true

      - name: 4. 运行 Web UI 并启动隧道
        id: tunnel
        run: |
          # 启动 Web 端
          nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
          sleep 10
          
          # 启动隧道
          nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          # 循环提取链接
          for i in {1..30}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
            if [ ! -z "$CF_URL" ]; then
              echo "url=$CF_URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 2
          done

      - name: 5. 最终状态
        run: |
          echo "=========================================="
          echo "✅ 部署尝试完成"
          echo "🔗 访问地址: ${{ steps.tunnel.outputs.url }}"
          echo "📊 状态检查:"
          docker ps --filter name=redroid
          adb devices
          echo "=========================================="

      - name: 保持运行
        run: sleep 21600
