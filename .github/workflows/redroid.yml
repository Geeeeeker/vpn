name: Redroid 云手机 (稳定恢复版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '720'
      screen_height:
        description: '高度'
        default: '1280'
      dpi:
        description: 'DPI (超清)'
        default: '440'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Cloudflared (原 dpkg 方式修复版)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb curl
          
          # 修正后的下载：使用 -L 并指向确定的 release 路径
          curl -L https://github.com -o cloudflared.deb
          
          # 校验文件是否为 HTML（防止再次下错）
          if grep -q "<!DOCTYPE html>" cloudflared.deb; then
            echo "❌ 下载到了网页而非安装包，尝试备用地址..."
            curl -L https://github.com -o cloudflared.deb
          fi
          
          sudo dpkg -i cloudflared.deb

      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          # 启动 Android
          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          sleep 10
          adb connect 127.0.0.1:5555 || true

      - name: 3. 部署 Web 控制端 (yumechan 方案)
        run: |
          # 这是目前唯一能避免 502 的稳定镜像
          docker run -d \
            --name scrcpy-web \
            --network host \
            --pull always \
            -e ADB_SERVER_IP=127.0.0.1 \
            yumechan/scrcpy-web:latest

          echo "等待 Web 服务响应..."
          timeout 60s bash -c 'until curl -s localhost:8000 > /dev/null; do sleep 3; done' || echo "Web端启动较慢..."

      - name: 4. 启动隧道与动态域名提取 (高速参考版)
        id: tunnel
        run: |
          # 参考案例：启动并捕获日志
          cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          # 等待建立连接
          sleep 25
          
          # 精准提取域名
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 隧道启动失败，查看日志:"
            cat cf.log
            exit 1
          fi
          echo "url=$CF_URL" >> $GITHUB_OUTPUT

      - name: 5. 最终验证
        run: |
          echo "=========================================="
          echo "✅ 部署完成！"
          echo "🔗 访问地址: ${{ steps.tunnel.outputs.url }}"
          echo "=========================================="
          echo "📊 状态检查:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          adb devices
          echo "=========================================="

      - name: 6. 保持运行
        run: sleep 21600
