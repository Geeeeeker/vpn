name: Redroid 云手机 (binderfs 终极方案)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
      root_mode:
        description: 'Root 权限 (默认非Root)'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'without-root'
          - 'with-root'
      screen_width:
        description: '宽度'
        default: '720'
      screen_height:
        description: '高度'
        default: '1280'
      dpi:
        description: 'DPI'
        default: '320'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖 (ADB, Node.js, Cloudflared)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb curl
          
          # 安装 Node.js 18 (包含 npx)
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # 安装 cloudflared
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # 验证 Docker 可用 (ubuntu-latest 自带)
          docker --version

      - name: 挂载 binderfs (无需内核模块)
        run: |
          # 创建挂载点
          sudo mkdir -p /dev/binderfs
          # 挂载 binder 文件系统
          sudo mount -t binder binder /dev/binderfs
          # 动态创建 binder 设备节点
          echo "binder" | sudo tee /dev/binderfs/binder-control > /dev/null
          echo "hwbinder" | sudo tee /dev/binderfs/binder-control > /dev/null
          echo "vndbinder" | sudo tee /dev/binderfs/binder-control > /dev/null
          # 设置权限，允许容器内访问
          sudo chmod 666 /dev/binderfs/*
          # 验证设备节点已创建
          ls -la /dev/binderfs/

      - name: 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            -v /dev/binderfs:/dev/binderfs:rw \
            --device /dev/binderfs/binder \
            --device /dev/binderfs/hwbinder \
            --device /dev/binderfs/vndbinder \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM

          # 等待容器初始化
          sleep 15
          # 尝试 ADB 连接
          adb connect 127.0.0.1:5555 || true

      - name: 启动 Web 控制端 ws-scrcpy
        run: |
          # 清理可能占用的端口
          sudo lsof -ti:8000 | xargs sudo kill -9 || true
          # 启动 ws-scrcpy 并记录日志
          nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
          # 等待端口监听 (最多 30 秒)
          for i in {1..30}; do
            if ss -tlnp | grep -q ':8000'; then
              echo "✅ ws-scrcpy 已监听 8000 端口"
              break
            fi
            sleep 1
          done
          # 如果仍未监听，输出日志并失败
          if ! ss -tlnp | grep -q ':8000'; then
            echo "❌ ws-scrcpy 启动失败，web.log 内容："
            cat web.log
            exit 1
          fi

      - name: 启动 Cloudflared 隧道
        id: tunnel
        run: |
          # 确认本地服务可访问
          curl -s http://localhost:8000 > /dev/null || { echo "本地服务无响应"; exit 1; }
          # 启动隧道
          cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          sleep 20
          # 提取公网 URL
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          if [ -z "$CF_URL" ]; then
            echo "❌ 隧道启动失败，查看日志:"
            cat cf.log
            exit 1
          fi
          echo "url=$CF_URL" >> $GITHUB_OUTPUT
          echo "✅ 公网地址: $CF_URL"

      - name: 显示部署信息
        run: |
          echo "=========================================="
          echo "✅ Redroid 云手机部署完成 (binderfs 方案)"
          echo "=========================================="
          echo "📱 配置信息:"
          echo "  - 版本: Android ${{ github.event.inputs.android_version }}"
          echo "  - 分辨率: ${{ github.event.inputs.screen_width }}x${{ github.event.inputs.screen_height }}"
          echo "  - DPI: ${{ github.event.inputs.dpi }}"
          echo "  - Root: ${{ github.event.inputs.root_mode }}"
          echo ""
          echo "🔗 访问地址 (点击下方链接):"
          echo "  ${{ steps.tunnel.outputs.url }}"
          echo ""
          echo "📊 实时状态:"
          echo "  - 容器: $(docker ps --filter name=redroid --format '{{.Status}}')"
          adb devices | grep "5555" || echo "  ⚠️ ADB 未就绪，请在网页稍后刷新"
          echo "=========================================="

      - name: 保持运行 (6小时)
        run: sleep 21600
