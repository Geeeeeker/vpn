name: Redroid 云手机 (解决502报错版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'without-root'
          - 'with-root'
      screen_width:
        description: '宽度'
        default: '720'
      screen_height:
        description: '高度'
        default: '1280'
      dpi:
        description: 'DPI (调高版)'
        default: '440'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境安装 (参考高速案例)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || echo "Skip Binder"

      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          sleep 10
          adb connect 127.0.0.1:5555 || true

      - name: 3. 启动 Web 控制端 (解决 502 的关键)
        run: |
          # 换用官方稳定维护的 docker 镜像，并使用 host 网络防止 502
          docker run -d \
            --name scrcpy-web \
            --network host \
            --pull always \
            -e ADB_SERVER_IP=127.0.0.1 \
            yumechan/scrcpy-web:latest

          echo "等待 Web 服务就绪..."
          # 循环检测 8000 端口是否真正开启
          timeout 60s bash -c 'until curl -s localhost:8000 > /dev/null; do sleep 2; done' || (echo "Web服务启动超时" && exit 1)

      - name: 4. 启动隧道与域名提取
        id: tunnel
        run: |
          # 隧道指向 localhost:8000
          cloudflared tunnel --url http://127.0.0.1:8000 > cf.log 2>&1 &
          
          sleep 20
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          
          if [ -z "$CF_URL" ]; then
            echo "❌ 隧道启动失败"
            cat cf.log
            exit 1
          fi
          echo "url=$CF_URL" >> $GITHUB_OUTPUT

      - name: 5. 验证服务
        run: |
          echo "=========================================="
          echo "✅ 部署完成！"
          echo "🔗 访问地址: ${{ steps.tunnel.outputs.url }}"
          echo "=========================================="
          echo "📊 状态检查:"
          docker ps
          adb devices
          echo "=========================================="

      - name: 6. 持续运行
        run: sleep 21600
