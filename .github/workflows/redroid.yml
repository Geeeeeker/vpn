name: Redroid 云手机 (终极修复版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '1080'
      screen_height:
        description: '高度'
        default: '1920'
      dpi:
        description: 'DPI'
        default: '480'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境清理与准备
        run: |
          sudo apt-get update
          sudo apt-get install -y adb wget
          # 确保 8000 端口没被占用
          sudo fuser -k 8000/tcp || true
          sudo modprobe binder_linux || echo "Binder OK"

      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          sleep 10
          adb connect 127.0.0.1:5555 || true

      - name: 3. 启动 Web 界面 (npx 模式)
        run: |
          # 显式指定端口 8000 启动
          nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
          echo "Web UI 启动中..."
          sleep 15

      - name: 4. 下载并运行 Cloudflared (修复版)
        id: cf_tunnel
        run: |
          # 改为直接下载二进制文件，避开 dpkg 报错
          wget -q https://github.com -O cloudflared
          chmod +x cloudflared
          
          # 启动隧道
          nohup ./cloudflared tunnel --url http://127.0.0.1:8000 > cf.log 2>&1 &
          
          echo "正在抓取公网链接..."
          # 增加重试逻辑，等待最多 60 秒
          for i in {1..60}; do
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
            if [ ! -z "$CF_URL" ]; then
              echo "url=$CF_URL" >> $GITHUB_OUTPUT
              echo "找到链接: $CF_URL"
              break
            fi
            sleep 2
          done
          
          if [ -z "$(grep -o 'https://.*\.trycloudflare\.com' cf.log)" ]; then
             echo "❌ 无法生成隧道链接，查看日志:"
             cat cf.log
             exit 1
          fi

      - name: 5. 部署结果
        run: |
          echo "=========================================="
          echo "✅ 云手机部署成功！"
          echo "🔗 访问地址: ${{ steps.cf_tunnel.outputs.url }}"
          echo "=========================================="
          echo "提示: 进入页面后点击 'H264 Converter' 即可查看画面"
          adb devices
          echo "=========================================="

      - name: 6. 持续运行
        run: sleep 21600
