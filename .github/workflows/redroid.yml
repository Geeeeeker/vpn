name: Redroid 云手机 (二进制运行版)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        default: '11.0.0'
        options:
          - '8.1.0'
          - '9.0.0'
          - '10.0.0'
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'
          - '14.0.0_64only'
          - '15.0.0_64only'
      root_mode:
        description: 'Root 权限'
        required: true
        type: choice
        default: 'without-root'
        options:
          - 'with-root'
          - 'without-root'
      screen_width:
        description: '宽度'
        default: '1080'
      screen_height:
        description: '高度'
        default: '1920'
      dpi:
        description: 'DPI'
        default: '480'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 准备环境 (ADB & 内核模块)
        run: |
          sudo apt-get update
          sudo apt-get install -y adb nodejs npm
          sudo modprobe binder_linux || echo "Binder 加载成功"

      - name: 2. 启动 Redroid 容器
        run: |
          IMAGE="redroid/redroid:${{ github.event.inputs.android_version }}-latest"
          # Root 逻辑：Redroid 官方参数
          ROOT_PARAM=""
          if [ "${{ github.event.inputs.root_mode }}" == "with-root" ]; then
            ROOT_PARAM="androidboot.redroid_debuggable=1 ro.secure=0 ro.debuggable=1"
          fi

          docker run -d --privileged \
            --name redroid \
            --network host \
            --pull always \
            $IMAGE \
            androidboot.redroid_width=${{ github.event.inputs.screen_width }} \
            androidboot.redroid_height=${{ github.event.inputs.screen_height }} \
            androidboot.redroid_dpi=${{ github.event.inputs.dpi }} \
            androidboot.redroid_gpu_mode=guest \
            $ROOT_PARAM
          
          # 等待并连接
          sleep 10
          adb connect 127.0.0.1:5555

      - name: 3. 运行 Web 界面 (Node.js 二进制方式)
        run: |
          # 克隆并运行现成的 Web 端方案，不依赖 Docker 镜像
          # 这里使用成熟的 ws-scrcpy 源码运行
          git clone https://github.com
          cd ws-scrcpy
          npm install
          # 启动服务并放入后台
          nohup npm start > web.log 2>&1 &
          echo "Web 服务已在后台启动"

      - name: 4. Cloudflare 公网穿透
        id: cf_tunnel
        run: |
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb
          
          # ws-scrcpy 默认监听端口为 8000
          nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
          
          echo "正在获取公网链接..."
          sleep 20
          CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
          echo "public_url=$CF_URL" >> $GITHUB_OUTPUT

      - name: 5. 最终状态输出
        run: |
          echo "=========================================="
          echo "✅ 云手机部署成功！"
          echo "🔗 公网访问地址: ${{ steps.cf_tunnel.outputs.public_url }}"
          echo "=========================================="
          echo "📱 手机信息:"
          adb -s 127.0.0.1:5555 shell getprop ro.build.version.release
          echo "DPI: ${{ github.event.inputs.dpi }}"
          echo "=========================================="
          echo "💡 提示: 进入网页后选择 H264 模式流畅度更高"

      - name: 持续运行 (6小时)
        run: sleep 21600
