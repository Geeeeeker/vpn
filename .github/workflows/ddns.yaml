name: 申请 Let's Encrypt 证书 (Dynv6)

on:
  workflow_dispatch:
    inputs:
      domains:
        description: '域名列表，多个用逗号分隔（例如：example.dynv6.net,www.example.dynv6.net）'
        required: true
      token:
        description: 'Dynv6 API Token'
        required: true

jobs:
  issue-cert:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 acme.sh
        run: |
          curl https://get.acme.sh | sh -s email=your-email@example.com
          echo "$HOME/.acme.sh" >> $GITHUB_PATH

      - name: 设置 Dynv6 Token 环境变量
        run: |
          echo "DYNV6_TOKEN=${{ inputs.token }}" >> $GITHUB_ENV

      - name: 申请证书
        run: |
          # 将输入的域名分割为数组
          IFS=',' read -ra DOMAIN_ARRAY <<< "${{ inputs.domains }}"
          
          # 构建 acme.sh 命令
          CMD="$HOME/.acme.sh/acme.sh --issue --dns dns_dynv6"
          for domain in "${DOMAIN_ARRAY[@]}"; do
            CMD="$CMD -d $domain"
          done
          
          echo "执行命令: $CMD"
          eval $CMD

      - name: 安装证书到本地目录
        run: |
          # 取第一个域名作为主域名（用于证书文件命名）
          FIRST_DOMAIN=$(echo "${{ inputs.domains }}" | cut -d',' -f1)
          
          mkdir -p ./certs
          $HOME/.acme.sh/acme.sh --install-cert -d "$FIRST_DOMAIN" \
            --cert-file ./certs/cert.pem \
            --key-file ./certs/key.pem \
            --fullchain-file ./certs/fullchain.pem \
            --ca-file ./certs/ca.pem

          # 生成一个简单的说明文件
          echo "证书包含的域名: ${{ inputs.domains }}" > ./certs/domains.txt
          echo "申请时间: $(date)" >> ./certs/domains.txt

      - name: 打包证书
        run: |
          tar -czf certs.tar.gz -C ./certs .

      - name: 生成 Release 标签名
        id: tag
        run: |
          # 生成一个有效的 Git 标签，例如 certs-20250330-143022
          TAG_NAME="certs-$(date +'%Y%m%d-%H%M%S')"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "生成的标签: $TAG_NAME"

      - name: 创建 Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          release_name: "SSL 证书 ${{ inputs.domains }} (${{ steps.tag.outputs.tag_name }})"
          draft: false
          prerelease: false

      - name: 上传证书包到 Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./certs.tar.gz
          asset_name: certs-${{ steps.tag.outputs.tag_name }}.tar.gz
          asset_content_type: application/gzip
