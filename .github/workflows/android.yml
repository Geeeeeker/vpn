      - name: 2. 启动模拟器并执行服务
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.android_version }}
          target: google_apis
          arch: arm64-v8a
          force-avd-creation: true
          # 核心修正：添加 -accel off 彻底禁用 HVF，并强制使用软件 GPU
          emulator-options: >-
            -no-window 
            -no-audio 
            -no-boot-anim 
            -accel off 
            -gpu swiftshader_indirect
          disable-animations: true
          script: |
            echo "⌛ 正在连接 ADB..."
            # 软件渲染启动极慢，将超时增加到 20 分钟
            adb wait-for-device
            
            echo "⌛ 等待 Android 系统桌面加载 (软件渲染较慢，请耐心等待)..."
            # 逻辑保持不变...
