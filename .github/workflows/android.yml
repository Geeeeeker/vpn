name: Android Emulator 云手机 (Fixed)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android API 版本'
        required: true
        type: choice
        default: '31'
        options:
          - '29'
          - '30'
          - '31'
          - '33'

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: 1. 安装基础工具
        run: |
          brew install --cask android-platform-tools
          brew install cloudflared

      - name: 2. 运行 Android 模拟器
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.android_version }}
          # 移除 profile: nexus_5x，使用默认设备
          target: google_apis
          arch: x86_64
          force-avd-creation: true # 强制重新创建以避免缓存错误
          # 优化启动参数，增加 -no-snapshot-load 确保冷启动
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -camera-back none
          disable-animations: true
          # 在脚本块中启动后续服务，防止主进程退出
          script: |
            echo "ADB 状态:"
            adb devices
            
            echo "🚀 启动 Web UI (ws-scrcpy)..."
            nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
            
            echo "☁️ 启动 Cloudflare 隧道..."
            nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
            
            echo "等待域名生成..."
            sleep 30
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
            
            echo "=========================================="
            echo "✅ 部署成功！"
            echo "🔗 访问地址: $CF_URL"
            echo "=========================================="
            
            # 保持模拟器和脚本运行
            sleep 21600
