name: Android Emulator 云手机 (极简兼容版)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Cloudflared
        run: |
          curl -L -o cloudflared.deb https://github.com
          sudo dpkg -i cloudflared.deb

      - name: 2. 运行低版本模拟器 (API 22)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 22 是无加速环境下的稳定性上限
          api-level: 22
          target: google_apis
          arch: x86
          force-avd-creation: true
          # 进一步简化参数，降低 CPU 负载
          emulator-options: -no-window -no-audio -no-boot-anim -accel off -gpu off
          disable-animations: true
          script: |
            echo "⌛ 正在等待模拟器初始化..."
            # 解决 adb offline 的常用手段：杀死再重启
            adb kill-server
            adb start-server
            sleep 30
            
            echo "⌛ 正在尝试连接 (可能需要 5 分钟以上)..."
            for i in {1..100}; do
              BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              if [ "$BOOT" = "1" ]; then
                echo "✅ 模拟器成功进入系统！"
                break
              fi
              echo "当前状态: $(adb devices | grep 'emulator-5554' || echo '未发现设备')"
              sleep 10
            done

            echo "🚀 启动 Web 控制端 (ws-scrcpy)..."
            nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
            
            echo "☁️ 开启 Cloudflare 隧道..."
            cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
            
            sleep 20
            CF_URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' cf.log | head -n 1)
            
            echo "=========================================="
            echo "🚀 云手机已就绪"
            echo "🔗 访问地址: $CF_URL"
            echo "⚠️ 注意: API 22 版本较低，部分新 App 可能无法运行"
            echo "=========================================="
            
            sleep 21600
