      - name: 2. 运行 Android 模拟器
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.android_version }}
          target: google_apis
          arch: arm64-v8a
          force-avd-creation: true
          # 关键修改：在 ARM macOS 上，不指定 gpu 模式通常最稳定，或使用 host
          emulator-options: -no-window -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "⌛ 等待模拟器完全启动..."
            adb wait-for-device
            
            # 确保系统界面已加载
            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do
              echo "仍在启动中..."
              sleep 5
            done
            echo "✅ 模拟器就绪！"

            echo "🚀 启动 Web UI 与 隧道..."
            nohup npx ws-scrcpy --port 8000 > web.log 2>&1 &
            nohup cloudflared tunnel --url http://localhost:8000 > cf.log 2>&1 &
            
            echo "🔗 提取访问地址..."
            timeout 60s sh -c 'until grep -o "https://.*\.trycloudflare\.com" cf.log; do sleep 2; done' | head -n 1
            
            echo "=========================================="
            echo "📱 云手机运行中，请通过上方链接访问"
            echo "=========================================="
            
            # 保持活跃防止 GitHub 认为任务卡死而杀掉进程
            for i in {1..360}; do
              echo "Keep-alive: $(date)"
              sleep 60
            done
